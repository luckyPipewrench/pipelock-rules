name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  security-scan:
    name: Pipelock scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Pipelock Scan
        uses: luckyPipewrench/pipelock@0b1257a9beeab61a3bb23df9906411678c52a4e1 # v2
        with:
          scan-diff: 'true'
          fail-on-findings: 'true'
          test-vectors: 'false'
          exclude-paths: |
            scripts/

  validate:
    name: Validate bundle
    needs: [security-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pipelock
        run: |
          curl -sL "https://github.com/luckyPipewrench/pipelock/releases/download/v2.0.0/pipelock_2.0.0_linux_amd64.tar.gz" | tar xz -C /usr/local/bin pipelock
          pipelock --version

      - name: Compile and validate bundle
        run: make validate

  test-fixtures:
    name: Test fixtures
    needs: [security-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run fixture tests
        run: make test-fixtures

  yaml-lint:
    name: Lint YAML
    needs: [security-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install yamllint
        run: pip install --require-hashes -r .github/requirements-yamllint.txt

      - name: Lint compiled bundle
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 300}, document-start: disable, truthy: disable, empty-lines: {max: 1}}}' published/pipelock-community/bundle.yaml
