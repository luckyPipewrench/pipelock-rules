name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  security-scan:
    name: Pipelock scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Pipelock Scan
        uses: luckyPipewrench/pipelock@cfec5f86720e24f1ee8d37eb6ad652a7efe5d868 # v2
        with:
          scan-diff: 'true'
          fail-on-findings: 'true'
          test-vectors: 'false'

  validate:
    name: Validate bundle
    needs: [security-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25'

      - name: Install pipelock
        run: go install github.com/luckyPipewrench/pipelock/cmd/pipelock@v1.5.0

      - name: Compile and validate bundle
        run: make validate

  test-fixtures:
    name: Test fixtures
    needs: [security-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run fixture tests
        run: make test-fixtures

  yaml-lint:
    name: Lint YAML
    needs: [security-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint compiled bundle
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 300}, document-start: disable, truthy: disable, empty-lines: {max: 1}}}' published/pipelock-community/bundle.yaml
